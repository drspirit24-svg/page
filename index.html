<!DOCTYPE html>
<html lang="ko">
<head>

    <meta name="robots" content="noindex, nofollow">

    <title>Link Page</title>
    <style>
        body {
            background-color: #1a2332;
            color: white;
            font-family: 'Segoe UI', sans-serif;
            display: flex;
            justify-content: center;
            padding: 50px;
        }

        .container {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 40px 60px;
            max-width: 1100px;
            width: 100%;
        }

        .section h2 {
            font-size: 1.1rem;
            margin-bottom: 15px;
            font-weight: 600;
        }

        .button-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 10px;
        }

        .btn {
            background-color: #24292e;
            border: 1px solid #30363d;
            border-radius: 8px;
            color: #c9d1d9;
            padding: 12px;
            text-align: center;
            text-decoration: none;
            font-size: 0.9rem;
            transition: background 0.3s;
            cursor: pointer;
        }

        .btn:hover {
            background-color: #30363d;
            color: white;
        }

        @media (max-width: 768px) {
            .container {
                grid-template-columns: 1fr;
                padding: 20px;
            }
        
            .button-grid {
                grid-template-columns: 1fr;
            }
        }        
    </style>
</head>
